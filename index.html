<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <div id="image-container">
      <img src="./images/image-product-mobile.jpg" alt="Perfume on top of a white desk">
    </div>
    <section id="product-info">
      <p id="category">P E R F U M E</p>
      <h1 id="title">Gabrielle Essence Eau De Parfum</h1>
      <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>
      <div id="prices">
        <p id="final-price" aria-label="Discount price">$149.99</p>
        <p id="og-price" aria-label="Original price">$169.99</p>
      </div>
      <button type="button"><img src="./images/icon-cart.svg" alt="">Add to Cart</button>
    </section>
  </main>
</body>
</html>
